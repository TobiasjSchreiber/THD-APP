<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORS Proxy Tester</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: auto;
            background: #121212;
            color: #fff;
        }

        h2 {
            color: #3A82F7;
        }

        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 12px;
            background: #222;
            border: 1px solid #444;
            word-break: break-all;
        }

        .success {
            border-left: 6px solid #34C759;
        }

        .error {
            border-left: 6px solid #FF3B30;
        }

        button {
            padding: 12px 20px;
            background: #3A82F7;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
        }

        button:hover {
            filter: brightness(1.2);
        }
    </style>
</head>

<body>
    <h2>THD Proxy Tester</h2>
    <p>Dieses Skript testet verschiedene CORS-Proxys, um zu sehen, welcher den THD Stundenplan aktuell erfolgreich
        herunterladen kann.</p>

    <button onclick="runTests()">Tests starten</button>
    <div id="output" style="margin-top: 20px;"></div>

    <script>
        // Beispiel URL (iCal Stundenplan der THD)
        const targetUrl = 'https://thabella.th-deg.de/thabella/opn/event/calendarStudentSubscribe?group=MT-MP4';

        const proxies = [
            { name: 'CodeTabs (Dein aktueller)', url: 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(targetUrl) },
            { name: 'CorsProxy.io', url: 'https://corsproxy.io/?' + encodeURIComponent(targetUrl) },
            { name: 'AllOrigins (Raw)', url: 'https://api.allorigins.win/raw?url=' + encodeURIComponent(targetUrl) },
            { name: 'ThingProxy', url: 'https://thingproxy.freeboard.io/fetch/' + encodeURIComponent(targetUrl) },
            { name: 'Cors-Anywhere (Heroku)', url: 'https://cors-anywhere.herokuapp.com/' + targetUrl },
            { name: 'YACDN Proxy', url: 'https://yacdn.org/proxy/' + targetUrl },
            { name: 'Cors.sh', url: 'https://proxy.cors.sh/' + targetUrl },
            { name: 'HTMLDriven', url: 'https://cors-proxy.htmldriven.com/?url=' + encodeURIComponent(targetUrl) },
            { name: 'CorsProxy.org', url: 'https://corsproxy.org/?' + encodeURIComponent(targetUrl) },
            { name: 'Cors-Clear (Deno)', url: 'https://cors-clear.deno.dev/' + targetUrl },
            { name: 'Afeld JSONP', url: 'https://jsonp.afeld.me/?url=' + encodeURIComponent(targetUrl) },
            { name: 'AZM Worker', url: 'https://cors-anywhere.azm.workers.dev/' + targetUrl },
            { name: 'Fringe Zone', url: 'https://cors-proxy.fringe.zone/' + targetUrl },
            { name: 'Cors.eu.org', url: 'https://cors.eu.org/' + targetUrl }
        ];

        function runTests() {
            const output = document.getElementById('output');
            output.innerHTML = '';

            proxies.forEach(proxy => {
                const div = document.createElement('div');
                div.className = 'result';
                div.innerHTML = `<strong>${proxy.name}</strong><br>Status: 🔄 Teste...`;
                output.appendChild(div);

                testProxy(proxy, div);
            });
        }

        async function testProxy(proxy, div) {
            const startTime = performance.now();
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 Sekunden Timeout

                const res = await fetch(proxy.url, { signal: controller.signal });
                clearTimeout(timeoutId);
                const ms = Math.round(performance.now() - startTime);

                if (res.ok) {
                    const text = await res.text();
                    if (text.includes('BEGIN:VCALENDAR')) {
                        div.classList.add('success');
                        div.innerHTML = `<strong>${proxy.name}</strong><br>✅ Erfolgreich! (${ms}ms)<br><small>iCal Daten wurden empfangen.</small>`;
                    } else {
                        div.classList.add('error');
                        div.innerHTML = `<strong>${proxy.name}</strong><br>⚠️ Verbindung OK, aber keine Kalenderdaten. (${ms}ms)<br><small>Antwort: ${text.substring(0, 50)}...</small>`;
                    }
                } else {
                    div.classList.add('error');
                    div.innerHTML = `<strong>${proxy.name}</strong><br>❌ HTTP Fehler: ${res.status} (${ms}ms)`;
                }
            } catch (err) {
                div.classList.add('error');
                if (err.name === 'AbortError') {
                    div.innerHTML = `<strong>${proxy.name}</strong><br>❌ Timeout (Proxy antwortet nicht nach 10s)`;
                } else {
                    div.innerHTML = `<strong>${proxy.name}</strong><br>❌ Netzwerkfehler: ${err.message}`;
                }
            }
        }
    </script>
</body>

</html>
